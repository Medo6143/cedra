kind = "web"
previewPath = "/"
title = "CEDAR Interior Design"
version = "1.0.0"
id = "artifacts/cedar-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19650

[services.development]
run = "pnpm --filter @workspace/cedar-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cedar-website", "run", "build" ]
publicDir = "artifacts/cedar-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19650"
BASE_PATH = "/"
